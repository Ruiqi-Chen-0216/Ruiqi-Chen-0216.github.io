<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="site-nav-simple">
        <ul class="site-nav-links">
          <li class="site-nav-home">
            <a href="/">Ruiqi Chen</a>
          </li>
          {% for link in site.data.navigation.main %}
          <li>
            <a href="{{ site.baseurl }}{{ link.url }}"{% if page.url contains link.url %} class="active"{% endif %}>{{ link.title }}</a>
          </li>
          {% endfor %}
          <li class="site-nav-icon">
            <a href="mailto:{{ site.author.email }}" title="Email"><i class="fas fa-fw fa-envelope"></i></a>
          </li>
          <li class="site-nav-icon">
            <a href="https://github.com/{{ site.author.github }}" target="_blank" rel="noopener" title="GitHub"><i class="fab fa-fw fa-github"></i></a>
          </li>
          <li class="site-nav-icon">
            <a href="{{ site.author.googlescholar }}" target="_blank" rel="noopener" title="Google Scholar"><i class="fas fa-fw fa-graduation-cap"></i></a>
          </li>
          <li class="site-nav-icon">
            <a href="https://www.linkedin.com/in/{{ site.author.linkedin }}" target="_blank" rel="noopener" title="LinkedIn"><i class="fab fa-fw fa-linkedin"></i></a>
          </li>
          <li class="site-nav-icon">
            <a href="{{ site.author.orcid }}" target="_blank" rel="noopener" title="ORCID"><i class="ai ai-fw ai-orcid"></i></a>
          </li>
        </ul>
      </nav>
    </div>
  </div>
</div>
